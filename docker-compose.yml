version: '3.8'

services:
  mongo:
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_DATABASE=SRE_project

  backend:
    build:
      context: ./modern-app/backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/SRE_project
      - MONGODB_DB_NAME=SRE_project
    depends_on:
      - mongo
    restart: always

  frontend:
    build:
      context: ./modern-app/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
